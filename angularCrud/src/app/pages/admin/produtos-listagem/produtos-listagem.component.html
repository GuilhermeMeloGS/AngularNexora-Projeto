<div class="pageProduto">
  <div class="header-lista">
    <h2>Listagem de Produtos</h2>
    <button *ngIf="isAdmin" class="btn-novo" [routerLink]="['/admin/produtos/cadastro']">
      + Adicionar Produto
    </button>
  </div>

  <table class="tabela-crud">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Preço</th>
        <th *ngIf="isAdmin">Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of listaProdutos">
        <td>{{ p.id }}</td>
        <td>{{ p.nome }}</td>
        <td>{{ p.descricao }}</td>
        <td>R$ {{ p.preco | number:'1.2-2' }}</td>
        <td *ngIf="isAdmin">
          <button
            class="btn-editar"
            [routerLink]="['/admin/produtos/cadastro', p.id]">
            Editar
          </button>
          <button
            class="btn-excluir"
            (click)="excluir(p.id!)">
            Excluir
          </button>
        </td>
      </tr>

      <tr *ngIf="listaProdutos.length === 0">
        <td colspan="5" style="text-align: center;">Nenhum produto encontrado.</td>
      </tr>
    </tbody>
  </table>
</div>
