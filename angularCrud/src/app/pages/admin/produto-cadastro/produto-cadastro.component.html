<div class="admin-page">
  <div class="admin-main">
    <div class="admin-page-header">
      <div>
        <h2 class="admin-page-title">{{ idAlterar ? 'Editar Produto' : 'Novo Produto' }}</h2>
        <p class="admin-page-subtitle">Preencha os dados abaixo</p>
      </div>
    </div>

    <div class="admin-content">
      <form class="admin-product-form" (ngSubmit)="submeter()">
        <div class="admin-form-section">
          <h3 class="admin-form-section-title">Informações do Produto</h3>
          <div class="admin-form-grid">
            <div>
              <label>Nome:</label>
              <input type="text" [(ngModel)]="produto.nome" name="nome" required>
            </div>
            <div>
              <label>Descrição:</label>
              <input type="text" [(ngModel)]="produto.descricao" name="descricao" required>
            </div>
            <div>
              <label>Preço:</label>
              <input type="number" [(ngModel)]="produto.preco" name="preco" required>
            </div>
            <div>
              <label>Imagem:</label>
              <input type="file" accept="image/*" (change)="onImagemSelecionada($event)" name="imagemFile">
              <div *ngIf="produto.imagem" style="margin-top: 10px;">
                <img [src]="produto.imagem" alt="Preview"
                  style="width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px;">
              </div>
            </div>
          </div>
        </div>

        <div class="admin-form-actions">
          <button type="submit" class="btn-salvar">Salvar</button>
          <button type="button" routerLink="/produtos" class="btn-cancelar">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
