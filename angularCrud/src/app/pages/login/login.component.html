<div class="login-layout">
  <aside class="login-side-panel" aria-label="Informações da plataforma">
    <div class="login-side-panel-content">
      <h2>Compre com Nexora!</h2>
      <p>Plataforma completa com os melhores produtos para o seu treino!</p>
      <div class="login-side-panel-stats">

      </div>
    </div>
    <div class="login-side-panel-decoration" aria-hidden="true"></div>
  </aside>

  <main class="login-form-container">
    <div class="login-form-card">
      <header class="login-form-header">
        <h1>Bem-vindo de volta</h1>
        <p>Entre com suas credenciais para acessar.</p>
      </header>

      
      <form class="login-form" (submit)="$event.preventDefault()" novalidate>
        
        
        <div class="form-field">
          <label for="login-email">E-mail</label>
          <div class="form-input-wrap">
            <input name="login" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" required [(ngModel)] = "login"/>
          </div>
        </div>


        <div class="form-field">
          <label for="login-senha">Senha</label>
          <div class="form-input-wrap">
            <input name="senha" type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password" required [(ngModel)] = "senha"/>
          </div>
        </div>

        <button class="btn btn--primary btn--full btn--lg"
                (click)="clicarLogin()"
        > Entrar</button>
        <p class="erro" *ngIf="erro">{{ erro }}</p>

      </form>
      <div class="login-divider"><span>ou</span></div>
      <p class="login-footer-text">Não tem conta? <a routerLink="/cadastrar" class="link-accent" >Cadastrar</a></p>
    </div>
  </main>
</div>
